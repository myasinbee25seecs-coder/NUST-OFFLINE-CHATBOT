<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUST FAQ Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-top: 12px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 12px 18px;
      border: none;
      background: #0b5fff;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    #answer {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f1f5ff;
      padding: 16px;
      border-radius: 10px;
      min-height: 60px;
    }
    small { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Offline NUST Admission FAQ Chatbot</h1>
    <small>Ask a question about NET, scholarships, hostels, GPA, admission, etc.</small>

    <input id="q" type="text" placeholder="Type your question here..." />
    <button onclick="ask()">Ask</button>

    <div id="answer">Your answer will appear here.</div>
  </div>

  <script>
    async function ask() {
      const q = document.getElementById("q").value.trim();
      const answer = document.getElementById("answer");
      if (!q) {
        answer.textContent = "Please type a question.";
        return;
      }

      answer.textContent = "Thinking...";
      const res = await fetch("/.netlify/functions/ask?q=" + encodeURIComponent(q));
      answer.textContent = await res.text();
    }

    document.getElementById("q").addEventListener("keydown", (e) => {
      if (e.key === "Enter") ask();
    });
  </script>
</body>
</html>
